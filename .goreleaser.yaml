version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: backlog-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: backlog-mcp
    repository:
      owner: corbym
      name: homebrew-backlog-mcp
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/corbym/backlog-mcp"
    description: "A local MCP server that gives AI agents read/write access to a story-based project backlog"
    license: "MIT"
    install: |
      bin.install "backlog-mcp"
    test: |
      system "#{bin}/backlog-mcp", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

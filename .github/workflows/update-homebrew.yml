name: Update Homebrew Tap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update formula for (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  update-tap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout backlog-mcp
        uses: actions/checkout@v4

      - name: Download checksums
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          curl -fsSL "https://github.com/corbym/backlog-mcp/releases/download/${VERSION}/checksums.txt" \
            -o checksums.txt

      - name: Extract sha256 values
        id: sha
        run: |
          sha_darwin_amd64=$(grep "darwin_amd64.tar.gz" checksums.txt | awk '{print $1}')
          sha_darwin_arm64=$(grep "darwin_arm64.tar.gz" checksums.txt | awk '{print $1}')
          sha_linux_amd64=$(grep  "linux_amd64.tar.gz"  checksums.txt | awk '{print $1}')
          sha_linux_arm64=$(grep  "linux_arm64.tar.gz"  checksums.txt | awk '{print $1}')
          echo "darwin_amd64=${sha_darwin_amd64}" >> "$GITHUB_OUTPUT"
          echo "darwin_arm64=${sha_darwin_arm64}" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=${sha_linux_amd64}"   >> "$GITHUB_OUTPUT"
          echo "linux_arm64=${sha_linux_arm64}"   >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: corbym/homebrew-backlog-mcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION_BARE="${VERSION#v}"
          FORMULA="homebrew-tap/Formula/backlog-mcp.rb"

          sed -i "s/version \".*\"/version \"${VERSION_BARE}\"/" "$FORMULA"

          python3 - <<'EOF'
          import re, os

          formula_path = os.environ.get("FORMULA", "homebrew-tap/Formula/backlog-mcp.rb")
          with open(formula_path) as f:
              content = f.read()

          replacements = {
              "darwin_amd64": os.environ["SHA_DARWIN_AMD64"],
              "darwin_arm64": os.environ["SHA_DARWIN_ARM64"],
              "linux_amd64":  os.environ["SHA_LINUX_AMD64"],
              "linux_arm64":  os.environ["SHA_LINUX_ARM64"],
          }

          for arch, sha in replacements.items():
              content = re.sub(
                  r'(url "https://github\.com/corbym/backlog-mcp/releases/download/[^"]+_' + arch + r'[^"]*"\n\s+sha256 ")[0-9a-f]*"',
                  r'\g<1>' + sha + '"',
                  content,
              )

          with open(formula_path, "w") as f:
              f.write(content)

          print("Formula updated successfully")
          EOF

          # Verify the expected sha256 values are present in the formula
          MISSING=0
          for SHA_VAR in SHA_DARWIN_AMD64 SHA_DARWIN_ARM64 SHA_LINUX_AMD64 SHA_LINUX_ARM64; do
            SHA_VAL="${!SHA_VAR}"
            if [ -z "$SHA_VAL" ]; then
              echo "ERROR: env var ${SHA_VAR} is empty" >&2
              MISSING=1
            elif ! grep -qF "$SHA_VAL" "$FORMULA"; then
              echo "ERROR: sha256 value for ${SHA_VAR} not found in formula after update" >&2
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "ERROR: formula update failed — one or more sha256 values were not written" >&2
            exit 1
          fi
        env:
          FORMULA: homebrew-tap/Formula/backlog-mcp.rb
          SHA_DARWIN_AMD64: ${{ steps.sha.outputs.darwin_amd64 }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_LINUX_AMD64:  ${{ steps.sha.outputs.linux_amd64 }}
          SHA_LINUX_ARM64:  ${{ steps.sha.outputs.linux_arm64 }}

      - name: Commit and push to tap
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          # Standard GitHub Actions bot email — see https://github.com/orgs/community/discussions/26560
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/backlog-mcp.rb
          git diff --cached --quiet || git commit -m "Update backlog-mcp to ${VERSION}"
          git push
